<!DOCTYPE html>
<html>
<head>
<title>Orders</title>

<style>
body{font-family:Arial;background:#f5f5f5;}
.container{max-width:800px;margin:40px auto;}

.card{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}
.back-btn{
    display:inline-block;
    background:#2e7d32;
    color:white;
    text-decoration:none;
    padding:12px 22px;
    border-radius:10px;
    font-weight:600;
    margin-bottom:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
    transition:0.3s;
}

.back-btn:hover{
    background:#1b5e20;
}

</style>

</head>

<body>

<div class="container">

<a href="{{ url_for('distributor.marketplace') }}" class="back-btn">
    🏠 Back to Dashboard
</a>

<h2 style="margin-bottom:20px;color:#2e7d32;">
📦 Order History
</h2>

{% for order in orders %}
<div class="card">
Order ID: {{ order[0] }} <br>
Total: ₹ {{ order[2] }} <br>
Date: {{ order[3] }}
</div>
{% endfor %}

</div>

</body>
</html>
