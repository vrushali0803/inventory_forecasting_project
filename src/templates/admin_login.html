<!DOCTYPE html>
<html>

<head>
<title>Admin Login</title>

<style>

body{
font-family:Arial;
background:#f4f6f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:40px;
width:320px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
text-align:center;
}

.login-box h2{
color:#2e7d32;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#2e7d32;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1b5e20;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

</body>

</html>
