<!DOCTYPE html>
<html>
<head>
<title>Payment</title>

<style>
body{
    font-family:Arial;
    background:#f5f7f9;
}

.container{
    max-width:500px;
    margin:60px auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

.option{
    border:1px solid #ddd;
    padding:15px;
    margin:10px 0;
    border-radius:8px;
    cursor:pointer;
    transition:0.2s;
}

.option:hover{
    border-color:#2e7d32;
    background:#f1f8f4;
}

button{
    width:100%;
    padding:12px;
    background:#2e7d32;
    color:white;
    border:none;
    border-radius:8px;
    margin-top:20px;
    font-size:16px;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="container">

<h2>💳 Select Payment Method</h2>

<form action="{{ url_for('distributor.place_order') }}" method="post">

<div class="option">
<input type="radio" name="payment" value="cod" checked> Cash on Delivery
</div>

<div class="option">
<input type="radio" name="payment" value="upi"> UPI
</div>

<div class="option">
<input type="radio" name="payment" value="card"> Debit/Credit Card
</div>

<button type="submit">Pay & Place Order</button>

</form>

</div>

</body>
</html>
